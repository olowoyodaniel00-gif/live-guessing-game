<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Guessing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="game-container">
      <!-- Sidebar: Players & Scores -->
      <div class="sidebar">
        <h3>👥 Players & Scores</h3>
        <div id="playersList"></div>
      </div>
      
      <!-- Main Chat-like Interface -->
      <div class="chat-area">
        <div class="chat-header">
          <h2>🎮 Live Guessing Game</h2>
          <div id="sessionInfo"></div>
        </div>
        
        <div class="messages" id="messages">
          <div class="system-msg">Welcome! Create or join a game session.</div>
        </div>
        
        <div class="input-area">
          <input type="text" id="messageInput" placeholder="Type your guess or command..." autocomplete="off">
          <button id="sendBtn">Send</button>
        </div>
        
        <div class="game-controls">
          <div id="gameStatus"></div>
          <div id="timerDisplay"></div>
        </div>
      </div>
    </div>
    
    <!-- Session Setup Modal -->
    <div id="setupModal" class="modal">
      <div class="modal-content">
        <h3>Join or Create Game</h3>
        <input type="text" id="playerNameInput" placeholder="Your name" autocomplete="off">
        <div style="margin: 10px 0;">
          <input type="text" id="sessionIdInput" placeholder="Session ID (to join)" autocomplete="off">
        </div>
        <button id="createBtn">Create New Session</button>
        <button id="joinBtn">Join Session</button>
      </div>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>

  <div class="sidebar">
  <h3>👥 Players & Scores</h3>
  <div id="playersList"></div>
  
  <hr style="margin: 15px 0; border-color: #4a5568;">
  
  <h3>🏆 All-Time Leaderboard</h3>
  <div id="leaderboardList" style="font-size: 12px;"></div>
  
  <button id="refreshLeaderboardBtn" style="margin-top: 10px; width: 100%; padding: 5px; background: #4a5568; color: white; border: none; border-radius: 5px; cursor: pointer;">
    🔄 Refresh Leaderboard
  </button>
</div>
</body>
</html>
